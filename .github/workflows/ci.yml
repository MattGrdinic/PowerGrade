name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:

jobs:
  build:
    name: build-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,      name: macos }
          - { os: windows-latest, name: windows }
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenCL (Windows)
        if: runner.os == 'Windows'
        run: vcpkg install opencl:x64-windows

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -S . -B build "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cp install/install-macos.command build/
          ( cd build && zip -r -y PowerGrade-macos.zip PowerGrade.ofx.bundle install-macos.command )

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          Copy-Item install\install-windows.bat build\
          Compress-Archive -Path build\PowerGrade.ofx.bundle,build\install-windows.bat -DestinationPath build\PowerGrade-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: PowerGrade-${{ matrix.name }}
          path: build/PowerGrade-${{ matrix.name }}.zip
          if-no-files-found: error

  release:
    name: release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.zip
          generate_release_notes: true
