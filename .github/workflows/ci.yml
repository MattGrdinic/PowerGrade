name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:

jobs:
  build:
    name: build-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,      name: macos }
          # Pinned, not windows-latest: that moved to VS 2026 in June 2026, and a
          # CUDA toolkit only accepts host MSVC versions it knows about (nvcc hard-
          # errors otherwise). VS 2022 + CUDA 13.2 is the combination validated on
          # real hardware. Revisit when CUDA officially supports the VS 2026 host.
          - { os: windows-2022,  name: windows }
    steps:
      - uses: actions/checkout@v4

      # The full toolkit, deliberately: no sub-packages list. Trimming it to
      # nvcc/cudart/visual_studio_integration left cuda_runtime.h without the
      # include/crt headers it pulls in ("Cannot open include file:
      # 'crt/host_config.h'"). The extra install minutes beat guessing which
      # sub-package a header hides in.
      #
      # Must stay on CUDA 13.x: -arch=all-major only emits SASS for the archs the
      # toolkit knows, and 12.x stops at sm_90 — a 12.x build ships no code for
      # Blackwell (sm_120), leaving Resolve to render the node on the CPU.
      #
      # This also supplies OpenCL (headers + OpenCL.lib), so there is no vcpkg
      # step: vcpkg resolved to its *debug* OpenCL.lib in a Release build, and
      # this matches the local setup the CUDA path was validated against.
      - name: Install CUDA (Windows)
        if: runner.os == 'Windows'
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '13.2.0'
          method: 'network'

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      # No vcpkg toolchain: OpenCL comes from the CUDA toolkit installed above.
      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DBUILD_CUDA=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      # A CUDA-less plugin still loads and renders — Resolve just silently falls
      # back to the CPU — so nothing above would fail. Assert the shipped bundle
      # really carries device code, including Blackwell (sm_120).
      - name: Verify CUDA kernel is in the bundle (Windows)
        if: runner.os == 'Windows'
        run: |
          $ofx = "build\PowerGrade.ofx.bundle\Contents\Win64\PowerGrade.ofx"
          $elf = & "$env:CUDA_PATH\bin\cuobjdump.exe" --list-elf $ofx
          Write-Host $elf
          if (-not ($elf | Select-String -Quiet 'sm_120')) {
            Write-Error "No sm_120 device code in $ofx - Resolve would render on the CPU."
            exit 1
          }

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cp install/install-macos.command build/
          ( cd build && zip -r -y PowerGrade-macos.zip PowerGrade.ofx.bundle install-macos.command )

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          Copy-Item install\install-windows.bat build\
          Compress-Archive -Path build\PowerGrade.ofx.bundle,build\install-windows.bat -DestinationPath build\PowerGrade-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: PowerGrade-${{ matrix.name }}
          path: build/PowerGrade-${{ matrix.name }}.zip
          if-no-files-found: error

  release:
    name: release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.zip
          generate_release_notes: true
